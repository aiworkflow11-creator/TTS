<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Audio Generator - Original</title>
    <style>
        body {font-family: Arial, sans-serif; background: #f2f2f2; padding: 40px;}
        .box {background: white; padding: 20px; max-width: 500px; margin: auto; border-radius: 8px;}
        h1 {text-align:center;}
        label, input, button {display:block; width:100%; margin-bottom: 15px;}
        button {padding: 10px; background:#667eea; color:white; border:none; border-radius:4px; cursor:pointer;}
    </style>
</head>
<body>
    <div class="box">
        <h1>Story Audio Generator</h1>
        <form id="form">
            <label for="name">Enter character name:</label>
            <input type="text" id="name" name="name" required maxlength="50">
            <button type="submit">Generate</button>
        </form>
        <div id="status"></div>
        <audio id="player" controls style="width:100%; display:none;"></audio>
    </div>
    <script>
        const form = document.getElementById('form');
        const status = document.getElementById('status');
        const player = document.getElementById('player');
        form.addEventListener('submit', async e => {
            e.preventDefault();
            status.textContent = 'Generating...';
            const name = document.getElementById('name').value.trim();
            const res = await fetch('/generate', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name})});
            const data = await res.json();
            if(res.ok){
                status.textContent = data.message;
                player.src = '/download/'+data.filename;
                player.style.display='block';
            } else {
                status.textContent = data.error;
            }
        });
    </script>
</body>
</html>
